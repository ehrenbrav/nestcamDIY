<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NestCam Live</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --bg2: #111827;
      --panel: rgba(17, 24, 39, 0.88);
      --border: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --accent2: #93c5fd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.98rem;
    }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .nav a {
      color: var(--text);
      text-decoration: none;
      background: rgba(17, 24, 39, 0.88);
      border: 1px solid var(--border);
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
    }
    .nav a:hover {
      border-color: var(--accent);
      color: white;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }
    .stream-frame {
      background: black;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .stream-frame img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      background: black;
    }
    .meta {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.94rem;
    }
    .meta strong { color: var(--accent2); font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>NestCam</h1>
        <div class="subtitle">Live preview from the birdhouse camera.</div>
      </div>
      <nav class="nav">
        <a href="/index.html">Live</a>
        <a href="/recordings">Recordings</a>
        <a href="/status.txt">Status</a>
      </nav>
    </div>
    <section class="panel">
      <div class="stream-frame">
        <img src="/stream.mjpg" alt="NestCam live stream" />
      </div>
      <div class="meta">
        <span><strong>Preview:</strong> responsive MJPEG live view</span>
        <span>Click Recordings to browse and download saved clips.</span>
      </div>
    </section>
  </div>
</body>
</html>
